name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdown-and-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint Markdown
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save markdownlint-cli@0.41.0
          npx markdownlint "**/*.md" --ignore node_modules

      - name: Check Links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: --verbose --no-progress --exclude-mail "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Skill Structure
        run: bash scripts/validate-skills.sh
