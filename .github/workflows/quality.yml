name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdown-and-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !node_modules/**

      - name: Check Links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: --verbose --no-progress --exclude-mail --exclude "https://img.shields.io/.*" --exclude "https://github.com/.*/actions/workflows/.*\\.yml/badge\\.svg" "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Skill Structure
        run: bash scripts/validate-skills.sh
